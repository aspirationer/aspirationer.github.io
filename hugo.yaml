baseURL: "https://aspirationer.github.io/"
locale: "en-US"
defaultContentLanguage: "en"
title: "Research Notes"
theme: "PaperMod"
copyright: "© {year} aspirationer"
enableRobotsTXT: true
enableEmoji: true

pagination:
  pagerSize: 8

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON

caches:
  images:
    dir: ":cacheDir/images"

minify:
  disableXML: true
  minifyOutput: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

params:
  env: production
  title: "Research Notes"
  description: "Research notes, publications, projects, and reproducible workflows."
  keywords:
    - Research
    - Science
    - Academic
    - Reproducibility
    - Hugo
  author: "aspirationer"
  defaultTheme: auto
  disableThemeToggle: false
  disableScrollToTop: false
  displayFullLangName: false

  DateFormat: "2006-01-02"
  ShowReadingTime: true
  ShowWordCount: true
  ShowShareButtons: true
  ShareButtons:
    - x
    - linkedin
    - reddit
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  hideFooter: false
  comments: false
  mainSections:
    - posts

  label:
    text: "Research Notes"

  profileMode:
    enabled: true
    title: "Research Notes"
    subtitle: "Research · Code · Ideas"
    imageUrl: "images/profile.png"
    imageTitle: "Profile photograph"
    imageWidth: 168
    imageHeight: 168
    buttons:
      - name: "Research Notes"
        url: "/posts/"
      - name: "Publications"
        url: "/publications/"

  socialIcons:
    - name: github
      title: "GitHub"
      url: "https://github.com/aspirationer"
    - name: rss
      title: "RSS"
      url: "/index.xml"

  editPost:
    URL: "https://github.com/aspirationer/aspirationer.github.io/tree/main/content"
    Text: "Suggest changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.35
    minMatchCharLength: 1
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - identifier: about
      name: "About"
      url: "/about/"
      weight: 10
    - identifier: publications
      name: "Publications"
      url: "/publications/"
      weight: 20
    - identifier: projects
      name: "Projects"
      url: "/projects/"
      weight: 30
    - identifier: archives
      name: "Archives"
      url: "/archives/"
      weight: 40
    - identifier: search
      name: "Search"
      url: "/search/"
      weight: 50
