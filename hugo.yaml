baseURL: "https://aspirationer.github.io/"
locale: "en-US"
defaultContentLanguage: "en"
title: "Siqi Hou"
theme: "PaperMod"
copyright: "© 2026 Siqi Hou"
enableRobotsTXT: true
enableEmoji: true

pagination:
  pagerSize: 8

taxonomies:
  category: categories
  tag: tags

outputs:
  home:
    - HTML
    - RSS
    - JSON

caches:
  images:
    dir: ":cacheDir/images"

minify:
  disableXML: true
  minifyOutput: true

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: true
    style: monokai

params:
  env: production
  title: "Siqi Hou"
  description: "Siqi Hou's research notes on computer vision, vision-language models, and spatial intelligence."
  keywords:
    - Computer Vision
    - Vision-Language Models
    - Spatial Intelligence
    - Reproducible Research
  author: "Siqi Hou"
  defaultTheme: auto
  disableThemeToggle: false
  disableScrollToTop: false
  displayFullLangName: false

  DateFormat: "2006-01-02"
  ShowReadingTime: true
  ShowWordCount: true
  ShowShareButtons: true
  ShareButtons:
    - x
    - linkedin
    - reddit
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  hideFooter: false
  comments: false
  mainSections:
    - posts

  label:
    text: "SH"

  profileMode:
    enabled: true
    title: "Siqi Hou"
    subtitle: "Computer Vision · VLM · Spatial Intelligence"
    imageUrl: "images/profile.png"
    imageTitle: "Profile photograph"
    imageWidth: 168
    imageHeight: 168
    buttons:
      - name: "Publications"
        url: "/publications/"
      - name: "CV"
        url: "/cv/"

  socialIcons:
    - name: github
      title: "GitHub"
      url: "https://github.com/aspirationer"
    - name: googlescholar
      title: "Google Scholar"
      url: "https://scholar.google.com/citations?hl=zh-TW&user=Cg2IxuIAAAAJ"
    - name: email
      title: "Email"
      url: "mailto:s230034018@gmail.com"
    - name: rss
      title: "RSS"
      url: "/index.xml"

  editPost:
    URL: "https://github.com/aspirationer/aspirationer.github.io/tree/main/content"
    Text: "Suggest changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.35
    minMatchCharLength: 1
    keys:
      - title
      - permalink
      - summary
      - content

menu:
  main:
    - identifier: news
      name: "News"
      url: "/cv/#news"
      weight: 5
    - identifier: notes
      name: "Notes"
      url: "/posts/"
      weight: 10
    - identifier: publications
      name: "Publications"
      url: "/publications/"
      weight: 20
    - identifier: projects
      name: "Projects"
      url: "/projects/"
      weight: 30
    - identifier: cv
      name: "CV"
      url: "/cv/"
      weight: 40
    - identifier: search
      name: "Search"
      url: "/search/"
      weight: 50
