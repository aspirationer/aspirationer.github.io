<div class="social-icons contact-icons" aria-label="Contact links">
    {{- range site.Params.socialIcons }}
        {{- $name := lower .name }}
        {{- if in (slice "github" "googlescholar" "email") $name }}
        <a href="{{ trim .url " " | safeURL }}" target="_blank" rel="noopener noreferrer me"
            title="{{ (.title | default .name) | title }}" aria-label="{{ (.title | default .name) | title }}">
            {{- partial "svg.html" . }}
        </a>
        {{- end }}
    {{- end }}
</div>
