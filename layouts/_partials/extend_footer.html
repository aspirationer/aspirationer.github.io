<script>
  (() => {
    const profile = document.querySelector(".profile");
    if (!profile || !document.body.classList.contains("list")) return;

    const canvas = document.createElement("canvas");
    canvas.className = "water-surface";
    canvas.setAttribute("aria-hidden", "true");
    document.body.prepend(canvas);

    const context = canvas.getContext("2d", { alpha: true });
    const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)");
    let width = 0;
    let height = 0;
    let pixelRatio = 1;
    let animationFrame = 0;
    let startTime = performance.now();

    const waves = [
      { y: 0.24, amplitude: 1.2, length: 420, speed: 0.00007, alpha: 0.12 },
      { y: 0.38, amplitude: 1.8, length: 310, speed: -0.00009, alpha: 0.16 },
      { y: 0.53, amplitude: 2.5, length: 245, speed: 0.00012, alpha: 0.2 },
      { y: 0.69, amplitude: 3.4, length: 185, speed: -0.00015, alpha: 0.17 },
      { y: 0.84, amplitude: 4.4, length: 145, speed: 0.00018, alpha: 0.13 }
    ];

    function resize() {
      const bounds = canvas.getBoundingClientRect();
      pixelRatio = Math.min(window.devicePixelRatio || 1, 1.5);
      width = Math.max(1, Math.round(bounds.width));
      height = Math.max(1, Math.round(bounds.height));
      canvas.width = Math.round(width * pixelRatio);
      canvas.height = Math.round(height * pixelRatio);
      context.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
    }

    function waveY(x, wave, elapsed, offset = 0) {
      const phase = elapsed * wave.speed + offset;
      const primary = Math.sin((x / wave.length) * Math.PI * 2 + phase);
      const secondary = Math.sin((x / (wave.length * 0.47)) * Math.PI * 2 - phase * 0.63);
      const drift = Math.sin((x / (wave.length * 2.2)) * Math.PI * 2 + phase * 0.28);
      return height * wave.y + wave.amplitude * (primary * 0.58 + secondary * 0.25 + drift * 0.17);
    }

    function traceWave(wave, elapsed, offset = 0) {
      context.beginPath();
      for (let x = -8; x <= width + 8; x += 6) {
        const y = waveY(x, wave, elapsed, offset);
        if (x === -8) context.moveTo(x, y);
        else context.lineTo(x, y);
      }
    }

    function draw(now) {
      const elapsed = reducedMotion.matches ? 0 : now - startTime;
      context.clearRect(0, 0, width, height);

      const glow = context.createLinearGradient(0, 0, 0, height);
      glow.addColorStop(0, "rgba(255,255,255,0)");
      glow.addColorStop(0.46, "rgba(255,255,255,0.025)");
      glow.addColorStop(1, "rgba(255,255,255,0.07)");
      context.fillStyle = glow;
      context.fillRect(0, 0, width, height);

      waves.forEach((wave, index) => {
        traceWave(wave, elapsed, index * 1.37);
        context.lineWidth = index < 2 ? 0.7 : 0.9;
        context.strokeStyle = `rgba(255,255,255,${wave.alpha})`;
        context.stroke();

        traceWave(wave, elapsed, index * 1.37 + 0.035);
        context.lineWidth = 2.2;
        context.strokeStyle = `rgba(255,255,255,${wave.alpha * 0.12})`;
        context.stroke();
      });

      if (!reducedMotion.matches && !document.hidden) {
        animationFrame = requestAnimationFrame(draw);
      }
    }

    function restart() {
      cancelAnimationFrame(animationFrame);
      startTime = performance.now();
      resize();
      draw(startTime);
    }

    window.addEventListener("resize", restart, { passive: true });
    reducedMotion.addEventListener("change", restart);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) restart();
      else cancelAnimationFrame(animationFrame);
    });

    restart();
  })();
</script>
